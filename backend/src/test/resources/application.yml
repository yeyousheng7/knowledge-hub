spring:
  ai:
    model:
      chat: none
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    vectorstore:
      redis:
        initialize-schema: false
        index-name: kh_note_chunks
        prefix: "kh:ai:note:chunk:"
  datasource:
    url: jdbc:h2:mem:knowledgehub_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false

app:
  invite-code: test-invite-code
  jwt:
    secret: test-jwt-secret-change-me-at-least-32-bytes
    expire-seconds: 86400
  admin:
    init:
      enabled: false
      username: admin
      password: admin123456
      nickname: admin
  ai:
    enabled: false
    index:
      vector-store: none
    rag:
      enabled: false
