# Local developer profile template.
# Copy this file to application-local.yml when running the backend from IDEA or Maven.
# For full Docker Compose startup, use application-docker.yml instead.

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_hub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: knowledgehub
    password: knowledgehub
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

app:
  invite-code: dev-invite-code
  jwt:
    secret: local-dev-jwt-secret-change-me-at-least-32-bytes
    expire-seconds: 86400
  admin:
    init:
      enabled: false
      username: 
      password: 
      nickname:
  ai:
    enabled: ${AI_ENABLED:false}
    chat:
      provider: ${AI_CHAT_PROVIDER:deepseek}
      base-url: ${AI_CHAT_BASE_URL:}
      api-key: ${AI_CHAT_API_KEY:}
      model: ${AI_CHAT_MODEL:}
    embedding:
      provider: ${AI_EMBEDDING_PROVIDER:}
      base-url: ${AI_EMBEDDING_BASE_URL:}
      api-key: ${AI_EMBEDDING_API_KEY:}
      model: ${AI_EMBEDDING_MODEL:}
      dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}
    index:
      chunk-size: ${AI_INDEX_CHUNK_SIZE:1024}
      chunk-overlap: ${AI_INDEX_CHUNK_OVERLAP:50}
      top-k: ${AI_INDEX_TOP_K:3}
      vector-index-name: ${AI_INDEX_VECTOR_INDEX_NAME:kh_note_chunks}
