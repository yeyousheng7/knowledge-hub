spring:
  ai:
    model:
      chat: none
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    openai:
      embedding:
        base-url: ${AI_EMBEDDING_BASE_URL:}
        api-key: ${AI_EMBEDDING_API_KEY:}
        options:
          model: ${AI_EMBEDDING_MODEL:}
          dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:knowledge_hub}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:knowledgehub}
    password: ${DB_PASSWORD:knowledgehub}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

app:
  invite-code: ${APP_INVITE_CODE:dev-invite-code}
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-me-at-least-32-bytes}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
  admin:
    init:
      enabled: ${ADMIN_INIT_ENABLED:false}
      username: ${ADMIN_USERNAME:}
      password: ${ADMIN_PASSWORD:}
      nickname: ${ADMIN_NICKNAME:}
  ai:
    enabled: ${AI_ENABLED:false}
    chat:
      provider: ${AI_CHAT_PROVIDER:deepseek}
      base-url: ${AI_CHAT_BASE_URL:}
      api-key: ${AI_CHAT_API_KEY:}
      model: ${AI_CHAT_MODEL:}
    embedding:
      dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}
    index:
      chunk-size: ${AI_INDEX_CHUNK_SIZE:1024}
      chunk-overlap: ${AI_INDEX_CHUNK_OVERLAP:50}
      top-k: ${AI_INDEX_TOP_K:3}
      vector-index-name: ${AI_INDEX_VECTOR_INDEX_NAME:kh_note_chunks}
