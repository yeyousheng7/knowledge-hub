spring:
  application:
    name: knowledgehub
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

server:
  port: 8080

app:
  invite-code: ${APP_INVITE_CODE}
  jwt:
    secret: ${JWT_SECRET}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
