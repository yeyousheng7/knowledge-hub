services:
  mysql:
    image: mysql:8.0
    container_name: knowledgehub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge_hub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-knowledgehub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-knowledgehub}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - knowledgehub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.4.0-v7
    container_name: knowledgehub-redis
    restart: unless-stopped
    expose:
      - ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledgehub-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-knowledge_hub}
      DB_USERNAME: ${MYSQL_USER:-knowledgehub}
      DB_PASSWORD: ${MYSQL_PASSWORD:-knowledgehub}

      APP_INVITE_CODE: ${APP_INVITE_CODE:-dev-invite-code}

      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-at-least-32-bytes}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-86400}

      ADMIN_INIT_ENABLED: ${ADMIN_INIT_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-admin}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}

      AI_ENABLED: ${AI_ENABLED:-false}
      SPRING_AI_MODEL_EMBEDDING: ${SPRING_AI_MODEL_EMBEDDING:-none}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      AI_RAG_ENABLED: ${AI_RAG_ENABLED:-false}
      AI_AGENT_ENABLED: ${AI_AGENT_ENABLED:-false}
      AI_AGENT_MEMORY_ENABLED: ${AI_AGENT_MEMORY_ENABLED:-false}
      AI_AGENT_MEMORY_MAX_MESSAGES: ${AI_AGENT_MEMORY_MAX_MESSAGES:-20}

      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER:-deepseek}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-}

      AI_EMBEDDING_BASE_URL: ${AI_EMBEDDING_BASE_URL:-}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}

      AI_INDEX_CHUNK_SIZE: ${AI_INDEX_CHUNK_SIZE:-1024}
      AI_INDEX_CHUNK_OVERLAP: ${AI_INDEX_CHUNK_OVERLAP:-50}
      AI_INDEX_TOP_K: ${AI_INDEX_TOP_K:-3}
      AI_INDEX_VECTOR_INDEX_NAME: ${AI_INDEX_VECTOR_INDEX_NAME:-kh_note_chunks}
      AI_INDEX_VECTOR_STORE: ${AI_INDEX_VECTOR_STORE:-none}
      AI_VECTORSTORE_REDIS_INITIALIZE_SCHEMA: ${AI_VECTORSTORE_REDIS_INITIALIZE_SCHEMA:-false}
      AI_VECTORSTORE_REDIS_PREFIX: "${AI_VECTORSTORE_REDIS_PREFIX:-kh:ai:note:chunk:}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledgehub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  knowledgehub_mysql_data:
